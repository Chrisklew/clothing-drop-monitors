name: Antipromo Drop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: {}     # manual trigger button

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: antipromo-state-${{ github.run_id }}
          restore-keys: antipromo-state-

      - name: Check for drops
        run: python check.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.ANTIPROMO_DISCORD_WEBHOOK }}

      - name: Save state
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: antipromo-state-${{ github.run_id }}
