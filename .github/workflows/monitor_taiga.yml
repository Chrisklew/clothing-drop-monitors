name: Taiga Takahashi Drop Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state_taiga.json
          key: taiga-state-${{ github.run_id }}
          restore-keys: taiga-state-

      - name: Check for drops
        run: python check_taiga.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.TAIGA_TAKAHASHI_DISCORD_WEBHOOK }}

      - name: Save state
        uses: actions/cache/save@v4
        with:
          path: state_taiga.json
          key: taiga-state-${{ github.run_id }}
